<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Addendum Generator — Dinara</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--surface:#fff;--border:#e8e2d9;--accent:#8b6914;--accent2:#2d5a4e;--text:#1a1612;--muted:#7a7068;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
.app{display:grid;grid-template-columns:360px 1fr;min-height:100vh}
.sidebar{background:var(--text);padding:28px 24px;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{font-family:var(--mono);font-size:13px;color:#c8a96e;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.sub{font-family:var(--mono);font-size:10px;color:#a09880;letter-spacing:.08em;margin-bottom:24px}
.main{padding:36px 44px;overflow-y:auto;background:#f5f5f5}
.sec{font-family:var(--mono);font-size:10px;color:#c8a96e;letter-spacing:.1em;text-transform:uppercase;margin:20px 0 10px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.1)}
.sec:first-child{margin-top:0}
.field{margin-bottom:10px}
.field label{font-family:var(--mono);font-size:10px;color:#a09880;letter-spacing:.07em;text-transform:uppercase;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:5px;padding:7px 10px;color:#faf8f5;font-family:var(--sans);font-size:12px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:#c8a96e}
.field select option{background:#1a1612}
.field textarea{resize:vertical;min-height:50px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:6px;border:none;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-gen{background:#c8a96e;color:#111;width:100%;justify-content:center;margin-top:18px;font-size:14px;padding:12px}
.btn-gen:hover{background:#d4b87a}
.btn-copy{background:#555;color:#fff;font-size:12px;padding:6px 12px}
.btn-docx{background:var(--accent);color:#fff;font-size:12px;padding:6px 12px}
.btn-clear{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:12px;padding:6px 12px}
.api-bar{background:#fff3cd;border:1px solid #ffc107;border-radius:7px;padding:10px 14px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.api-bar input{flex:1;background:#fff;border:1px solid #ddd;border-radius:5px;padding:6px 9px;font-family:var(--mono);font-size:11px;outline:none}
.api-bar.saved{background:#d4edda;border-color:#28a745}
.preset-btn{display:inline-block;padding:3px 9px;border-radius:4px;background:rgba(255,255,255,.08);color:#c8a96e;font-family:var(--mono);font-size:10px;cursor:pointer;margin:2px;border:1px solid rgba(200,169,110,.25);transition:all .15s}
.preset-btn:hover{background:rgba(200,169,110,.2)}

/* ── Document preview — matches real addendum style ── */
.doc-wrap{background:#fff;max-width:820px;margin:0 auto;padding:40px 48px;box-shadow:0 2px 20px rgba(0,0,0,.1);font-family:'Times New Roman',Times,serif;font-size:12pt;line-height:1.4}
.doc-actions{display:flex;gap:8px;margin-bottom:16px;justify-content:flex-end}

/* Two-column table matching original format */
.add-tbl{width:100%;border-collapse:collapse;font-size:12pt}
.add-tbl td{padding:4px 8px;vertical-align:top;border:1px solid #000;width:50%}
.add-tbl .title-td{text-align:center;font-weight:bold;font-size:12pt;padding:8px;border:1px solid #000}
.add-tbl .date-td{text-align:center;padding:4px 8px;border:1px solid #000}
.add-tbl .section-td{font-weight:bold;text-decoration:underline;padding:4px 8px;border:1px solid #000}
.add-tbl .content-td{padding:4px 8px;border:1px solid #000}
.add-tbl .noborder-td{border:none;padding:4px 8px}

.loader{display:none;align-items:center;gap:12px;padding:40px;justify-content:center}
.loader.on{display:flex}
.spin{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{padding:60px 28px;text-align:center;color:var(--muted);background:#fff;max-width:820px;margin:0 auto;box-shadow:0 2px 20px rgba(0,0,0,.1)}
.empty-i{font-size:44px;margin-bottom:14px}
.empty-t{font-family:var(--mono);font-size:16px;color:var(--text);margin-bottom:6px}
/* Drop zone */
.drop-zone{border:2px dashed rgba(255,255,255,.2);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:16px}
.drop-zone:hover,.drop-zone.over{border-color:#c8a96e;background:rgba(200,169,110,.08)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-zone-label{color:#a09880;font-size:11px;font-family:var(--mono)}
.drop-zone-label span{color:#c8a96e}
.ocr-status{font-family:var(--mono);font-size:10px;padding:6px 10px;border-radius:5px;margin-bottom:10px;display:none}
.ocr-status.loading{display:block;background:rgba(200,169,110,.1);color:#c8a96e}
.ocr-status.done{display:block;background:rgba(45,90,78,.15);color:#7eb8a4}
.ocr-status.err{display:block;background:rgba(192,57,43,.1);color:#c0392b}
#toast{position:fixed;bottom:22px;right:22px;background:var(--text);border-radius:7px;padding:11px 16px;font-size:13px;color:#faf8f5;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999}
#toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="logo">Addendum Generator</div>
  <div class="sub">Bilingual EN · RU · Dinara</div>

  <div class="api-bar" id="api-bar">
    <span style="font-size:11px;color:#856404;white-space:nowrap">API Key</span>
    <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." onfocus="this.type='text'" onblur="this.type='password'" onkeydown="if(event.key==='Enter')saveKey()">
    <button onclick="saveKey()" style="background:#856404;color:#fff;border:none;border-radius:5px;padding:5px 10px;font-size:11px;cursor:pointer">Save</button>
  </div>

  <div class="sec">Quick presets</div>
  <div>
    <span class="preset-btn" onclick="loadPreset('KAR-TOM-EUR')">KAR-TOM-EUR</span>
    <span class="preset-btn" onclick="loadPreset('KAR-TOM-USD')">KAR-TOM-USD</span>
    <span class="preset-btn" onclick="loadPreset('KAR-AFR')">KAR-AFR</span>
    <span class="preset-btn" onclick="loadPreset('ARG-KAR')">ARG-KAR</span>
    <span class="preset-btn" onclick="loadPreset('ARG-DKS')">ARG-DKS</span>
  </div>

  <div class="sec">Auto-fill from invoice</div>
  <div class="drop-zone" id="drop-zone" ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)">
    <input type="file" accept=".pdf,.png,.jpg,.jpeg,.docx" onchange="dzFile(this)">
    <div style="font-size:22px;margin-bottom:6px">📎</div>
    <div class="drop-zone-label">Drop invoice or <span>browse</span></div>
    <div class="drop-zone-label" style="margin-top:3px;font-size:10px">PDF · PNG · JPG · DOCX</div>
  </div>
  <div class="ocr-status" id="ocr-status"></div>

  <div class="sec">Contract</div>
  <div class="field"><label>Contract reference</label><input id="f-contract" placeholder="ARG-DKS-EUR 2025-01 dt 22.04.2025"></div>
  <div class="g2">
    <div class="field"><label>Addendum № (number only)</label><input id="f-num" placeholder="21" type="number"></div>
    <div class="field"><label>Date</label><input id="f-date"></div>
  </div>
  <div class="g2">
    <div class="field"><label>Seller</label><input id="f-seller" placeholder="Argini Trading GmbH"></div>
    <div class="field"><label>Buyer</label><input id="f-buyer" placeholder="DKS Cocoa Products"></div>
  </div>

  <div class="sec">Goods</div>
  <div class="field"><label>Product (EN)</label><input id="f-product-en" placeholder="Robusta Coffee"></div>
  <div class="field"><label>Product (RU — blank = auto)</label><input id="f-product-ru" placeholder="auto-translate"></div>
  <div class="g2">
    <div class="field"><label>Origin (EN)</label><input id="f-origin-en" placeholder="Cameroon"></div>
    <div class="field"><label>Origin (RU)</label><input id="f-origin-ru" placeholder="auto"></div>
  </div>
  <div class="field"><label>Lot / Batch ref</label><input id="f-lot" placeholder="LOT 0001 / CMAU0864070"></div>

  <div class="sec">Quantity & Price</div>
  <div class="g2">
    <div class="field"><label>Quantity (tons)</label><input id="f-qty" placeholder="18,107"></div>
    <div class="field"><label>Bags/Cartons</label><input id="f-bags" placeholder="300 bags 60kg"></div>
  </div>
  <div class="g2">
    <div class="field"><label>Price per ton</label><input id="f-price" placeholder="2'000.00"></div>
    <div class="field"><label>Currency</label><select id="f-currency"><option>EUR</option><option>USD</option><option>CHF</option></select></div>
  </div>
  <div class="field"><label>Total value</label><input id="f-total" placeholder="36'214.00"></div>

  <div class="sec">Terms</div>
  <div class="field"><label>Payment terms</label><input id="f-payment-en" placeholder="Postpayment"></div>
  <div class="g2">
    <div class="field"><label>Packaging (EN)</label><input id="f-pack-en" placeholder="60 kg net bags"></div>
    <div class="field"><label>Packaging (RU)</label><input id="f-pack-ru" placeholder="auto"></div>
  </div>
  <div class="field"><label>Delivery period</label><input id="f-delivery-en" placeholder="Delivery in April 2026"></div>
  <div class="field"><label>Incoterms</label><input id="f-incoterm" placeholder="FCA TALLINN"></div>
  <div class="field"><label>Additional notes</label><textarea id="f-notes" placeholder="Any extra info..."></textarea></div>

  <button class="btn btn-gen" onclick="generate()">✦ Generate Addendum</button>
</aside>

<main class="main">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;max-width:820px;margin-left:auto;margin-right:auto">
    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase">Preview</div>
    <div style="display:flex;gap:8px" id="act-btns">
      <button class="btn btn-clear" onclick="clearOut()">Clear</button>
      <button class="btn btn-copy" onclick="copyTxt()">⎘ Copy text</button>
      <button class="btn btn-docx" onclick="dlDocx()">↓ Download .docx</button>
    </div>
  </div>

  <div class="loader" id="loader"><div class="spin"></div><span style="color:var(--muted)">Generating…</span></div>

  <div class="empty" id="empty-st">
    <div class="empty-i">📄</div>
    <div class="empty-t">Ready to generate</div>
    <p style="font-size:13px;margin-top:6px">Fill the form and click Generate</p>
  </div>

  <!-- Document preview -->
  <div class="doc-wrap" id="doc-wrap" style="display:none">
    <table class="add-tbl" id="add-tbl"></table>
  </div>
</main>
</div>
<div id="toast"></div>
<script>
let _key=localStorage.getItem('dinara_api_key')||'';
let _last=null;
if(_key){document.getElementById('api-key-input').placeholder='✓ Key saved';document.getElementById('api-bar').classList.add('saved')}

function saveKey(){
  const k=document.getElementById('api-key-input').value.trim();
  if(!k.startsWith('sk-ant')){toast('Invalid key');return}
  _key=k;localStorage.setItem('dinara_api_key',k);
  document.getElementById('api-key-input').value='';
  document.getElementById('api-key-input').placeholder='✓ Key saved';
  document.getElementById('api-bar').classList.add('saved');
  toast('✓ API key saved');
}

const PRESETS={
  'KAR-TOM-EUR':{contract:'KAR-TOM-EUR 02/2025 dd 22.04.2025',seller:'LLP Karzhas Trading',buyer:'Tomer LLC',currency:'EUR',pack_en:'25 kg net cartons',pack_ru:'Коробки по 25 кг нетто',incoterm:'DAP Moscow region',payment_en:'Within 4 weeks after invoice date'},
  'KAR-TOM-USD':{contract:'KAR-TOM-USD 01/2025 dd 01.04.2025',seller:'LLP Karzhas Trading',buyer:'Tomer LLC',currency:'USD',pack_en:'25 kg net cartons',pack_ru:'Коробки по 25 кг нетто',incoterm:'DAP Moscow region',payment_en:'Within 4 weeks after invoice date'},
  'KAR-AFR':{contract:'KAR-AFR 01/2025 dd 22.04.2025',seller:'LLP Karzhas Trading',buyer:'OOO AFROMIXGLOBAL',currency:'EUR',pack_en:'25 kg net cartons',pack_ru:'Коробки по 25 кг нетто',incoterm:'FCA Tallinn',payment_en:'Postpayment'},
  'ARG-KAR':{contract:'ARG-KAR 2025-01 dt 04.02.2025',seller:'Argini Trading GmbH',buyer:'LLP Karzhas Trading',currency:'EUR',pack_en:'25 kg net cartons',pack_ru:'Коробки по 25 кг нетто',incoterm:'CIF Tallinn',payment_en:'Within 4 weeks after invoice date'},
  'ARG-DKS':{contract:'ARG-DKS-EUR 2025-01 dt 22.04.2025',seller:'Argini Trading GmbH',buyer:'DKS Cocoa Products S.À R.L.',currency:'EUR',pack_en:'60 kg net bags',pack_ru:'Мешки по 60 кг нетто',incoterm:'FCA TALLINN',payment_en:'Postpayment'}
};
function loadPreset(k){
  const p=PRESETS[k];if(!p)return;
  Object.entries(p).forEach(([f,v])=>{const el=document.getElementById('f-'+f);if(el)el.value=v});
  toast('✓ Preset: '+k);
}

function gf(id){return document.getElementById(id).value.trim()}

async function generate(){
  if(!_key){toast('Enter API key first');return}
  const contract=gf('f-contract');
  if(!contract){toast('Enter contract reference');return}
  document.getElementById('loader').classList.add('on');
  document.getElementById('empty-st').style.display='none';
  document.getElementById('doc-wrap').style.display='none';

  const prompt=`Generate a bilingual addendum exactly matching this format (based on real trading documents).

Contract: ${contract}
Addendum №: ${gf('f-num')||'?'}
Date: ${gf('f-date')}
Seller: ${gf('f-seller')}
Buyer: ${gf('f-buyer')}
Product EN: ${gf('f-product-en')}
Product RU: ${gf('f-product-ru')||'(translate from EN)'}
Origin EN: ${gf('f-origin-en')}
Origin RU: ${gf('f-origin-ru')||'(translate from EN)'}
Lot/Batch: ${gf('f-lot')||''}
Quantity: ${gf('f-qty')} tons nett
Bags/Cartons: ${gf('f-bags')}
Price: ${gf('f-currency')} ${gf('f-price')} per ton
Total: ${gf('f-currency')} ${gf('f-total')}
Payment: ${gf('f-payment-en')}
Packaging EN: ${gf('f-pack-en')}
Packaging RU: ${gf('f-pack-ru')||'(translate from EN)'}
Delivery: ${gf('f-delivery-en')}
Incoterms: ${gf('f-incoterm')}
Notes: ${gf('f-notes')||'none'}

Return ONLY valid JSON no markdown:
{
  "title_en": "ADDENDUM №X TO CONTRACT\\n№ CONTRACT_REF",
  "title_ru": "ПРИЛОЖЕНИЕ №X К КОНТРАКТУ\\n№ CONTRACT_REF",
  "date_en": "Date: DD.MM.YYYY",
  "date_ru": "Дата: DD.MM.YYYY",
  "goods_en": "product name EN",
  "goods_ru": "product name RU",
  "origin_en": "Country of Origin: X",
  "origin_ru": "Страна происхождения: X RU",
  "lot": "lot/batch info if any",
  "qty_en": "XX,XXX tons nett\\nXXX bags/cartons",
  "qty_ru": "XX,XXX тонн нетто\\nXXX мешков/коробок",
  "price_en": "CUR X'XXX per ton\\nINCOTERM PLACE",
  "price_ru": "X'XXX CUR за тонну\\nINCOTERM PLACE RU",
  "total_en": "CUR XX'XXX,XX",
  "total_ru": "XX'XXX,XX CUR",
  "payment_en": "payment terms EN",
  "payment_ru": "условия оплаты RU",
  "pack_en": "packaging EN",
  "pack_ru": "упаковка RU",
  "delivery_en": "Delivery in Month YYYY.\\nINCOTERM PLACE.",
  "delivery_ru": "Поставка в Месяц YYYY г.\\nINCOTERM МЕСТО."
}`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':_key,'anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({
      ..._last,model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
    const resp=await r.json();
    if(resp.error)throw new Error(resp.error.message);
    const raw=resp.content[0].text.replace(/```json|```/g,'').trim();
    const data=JSON.parse(raw.slice(raw.indexOf('{'),raw.lastIndexOf('}')+1));
    // Add computed fields for template filler
    data.price_formatted = (data.price_en||'').replace(/EUR |USD |CHF /,'').replace(/ per ton.*$/,'') + ' ' + (data.currency||'') + '/MT';
    data.price_ru = data.price_formatted.replace('MT','т');
    data.incoterm_ru = (data.incoterm||'');
    data.qty_tons = (data.qty||'').split(' ')[0];
    data.total_en = (data.total||'') + ' ' + (data.currency||'');
    data.total_ru = (data.total||'') + ' ' + (data.currency||'');
    data.seller_name = 'Dinara Apiyeva';
    data.seller_name_ru = 'Динара Апиева';
    data.seller_title = 'Director';
    data.seller_title_ru = 'Директор';
    _last=data;
    renderDoc(data);
  }catch(e){toast('Error: '+e.message);console.error(e)}
  document.getElementById('loader').classList.remove('on');
}

function nl(s){return(s||'').replace(/\n/g,'<br>')}

function renderDoc(d){
  // Matches exactly the format of original addenda:
  // Two columns, plain borders, bold underlined section headers, centered title
  const html=`
    <tr><td class="title-td">${nl(d.title_en)}</td><td class="title-td">${nl(d.title_ru)}</td></tr>
    <tr><td class="date-td">${d.date_en}</td><td class="date-td">${d.date_ru}</td></tr>
    <tr><td class="section-td">1. GOODS</td><td class="section-td">1. ТОВАР</td></tr>
    <tr><td class="content-td">${nl(d.goods_en)}${d.lot?'<br>'+d.lot:''}</td><td class="content-td">${nl(d.goods_ru)}</td></tr>
    <tr><td class="content-td">${d.origin_en}</td><td class="content-td">${d.origin_ru}</td></tr>
    <tr><td class="section-td">2. QUANTITY</td><td class="section-td">2. КОЛИЧЕСТВО</td></tr>
    <tr><td class="content-td">${nl(d.qty_en)}</td><td class="content-td">${nl(d.qty_ru)}</td></tr>
    <tr><td class="section-td">3. PRICE</td><td class="section-td">3. ЦЕНА</td></tr>
    <tr><td class="content-td">${nl(d.price_en)}</td><td class="content-td">${nl(d.price_ru)}</td></tr>
    <tr><td class="section-td">4. TOTAL VALUE</td><td class="section-td">4. ОБЩАЯ СТОИМОСТЬ</td></tr>
    <tr><td class="content-td">${nl(d.total_en)}</td><td class="content-td">${nl(d.total_ru)}</td></tr>
    <tr><td class="section-td">5. PAYMENT TERMS</td><td class="section-td">5. УСЛОВИЯ ОПЛАТЫ</td></tr>
    <tr><td class="content-td">${nl(d.payment_en)}</td><td class="content-td">${nl(d.payment_ru)}</td></tr>
    <tr><td class="section-td">6. PACKAGING</td><td class="section-td">6. УПАКОВКА</td></tr>
    <tr><td class="content-td">${nl(d.pack_en)}</td><td class="content-td">${nl(d.pack_ru)}</td></tr>
    <tr><td class="section-td">7. DELIVERY PERIOD and TERMS</td><td class="section-td">7. СРОК и УСЛОВИЯ ПОСТАВКИ</td></tr>
    <tr><td class="content-td">${nl(d.delivery_en)}</td><td class="content-td">${nl(d.delivery_ru)}</td></tr>
  `;
  document.getElementById('add-tbl').innerHTML=html;
  document.getElementById('doc-wrap').style.display='block';
  toast('✓ Addendum generated');
}

function copyTxt(){
  if(!_last)return;
  const d=_last;
  const t=`${d.title_en}     ${d.title_ru}\n${d.date_en}     ${d.date_ru}\n\n1. GOODS / 1. ТОВАР\n${d.goods_en}${d.lot?'\n'+d.lot:''} / ${d.goods_ru}\n${d.origin_en} / ${d.origin_ru}\n\n2. QUANTITY / 2. КОЛИЧЕСТВО\n${d.qty_en} / ${d.qty_ru}\n\n3. PRICE / 3. ЦЕНА\n${d.price_en} / ${d.price_ru}\n\n4. TOTAL VALUE / 4. ОБЩАЯ СТОИМОСТЬ\n${d.total_en} / ${d.total_ru}\n\n5. PAYMENT TERMS / 5. УСЛОВИЯ ОПЛАТЫ\n${d.payment_en} / ${d.payment_ru}\n\n6. PACKAGING / 6. УПАКОВКА\n${d.pack_en} / ${d.pack_ru}\n\n7. DELIVERY PERIOD AND TERMS / 7. СРОК И УСЛОВИЯ ПОСТАВКИ\n${d.delivery_en} / ${d.delivery_ru}`;
  navigator.clipboard.writeText(t).then(()=>toast('✓ Copied'));
}

async function dlDocx(){
  if(!_last){toast('Generate first');return}
  toast('Generating document...');
  try{
    // Build payload matching template fields exactly
    const contract = gf('f-contract');
    const dateMatch = contract.match(/(\d{2}\.\d{2}\.\d{4})/);
    const dateContract = dateMatch ? dateMatch[1] : '';
    
    const totalNum = (gf('f-total')||'').replace(/[^0-9]/g,'');
    const currency = gf('f-currency')||'EUR';
    
    // Price formatted for template
    const priceVal = (gf('f-price')||'').replace(/[^0-9'.,]/g,'');
    const priceEN = currency+' '+priceVal+' per ton';
    const priceRU = priceVal+' '+currency+'/т';
    
    const payload = {
      num: gf('f-num'),
      contract: contract,
      date_contract: dateContract,
      date: gf('f-date'),
      goods_en: gf('f-product-en'),
      goods_ru: gf('f-product-ru'),
      origin_en: gf('f-origin-en'),
      origin_ru: gf('f-origin-ru'),
      qty: gf('f-qty'),
      price_en: priceEN,
      price_ru: priceRU,
      incoterm: gf('f-incoterm'),
      incoterm_ru: gf('f-incoterm'),
      total_num: totalNum,
      currency: currency,
      payment_en: gf('f-payment-en'),
      payment_ru: _last.payment_ru||gf('f-payment-en'),
      pack_en: gf('f-pack-en'),
      pack_ru: gf('f-pack-ru'),
      delivery_en_1: (gf('f-delivery-en')||'').split('\n')[0],
      delivery_en_2: (gf('f-delivery-en')||'').split('\n')[1]||gf('f-incoterm'),
      delivery_ru_1: (_last.delivery_ru||'').split('\n')[0],
      delivery_ru_2: (_last.delivery_ru||'').split('\n')[1]||gf('f-incoterm'),
      seller_first: 'Dinara',
      seller_last: 'Apiyeva',
      seller_ru: 'Динара Апиева',
      buyer_name: '',
      buyer_ru: '',
    };
    
    const res = await fetch('/.netlify/functions/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error||'Server error '+res.status);
    }
    
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Addendum_N'+(gf('f-num')||'X')+'_'+(contract.replace(/[^a-zA-Z0-9]/g,'_').slice(0,20))+'.docx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('✓ Downloaded');
  }catch(err){
    toast('Error: '+err.message);
    console.error(err);
  }
}


function clearOut(){
  document.getElementById('doc-wrap').style.display='none';
  document.getElementById('empty-st').style.display='block';
  _last=null;
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

// ── Drop zone ──────────────────────────────────────────────────
function dzOver(e){e.preventDefault();document.getElementById('drop-zone').classList.add('over')}
function dzLeave(){document.getElementById('drop-zone').classList.remove('over')}
function dzDrop(e){e.preventDefault();dzLeave();const f=e.dataTransfer.files[0];if(f)ocrFile(f)}
function dzFile(input){if(input.files[0])ocrFile(input.files[0])}

function setStatus(msg,type){
  const el=document.getElementById('ocr-status');
  el.textContent=msg;el.className='ocr-status '+type;
}

async function ocrFile(file){
  if(!_key){toast('Enter API key first');return}
  setStatus('📖 Reading document...','loading');

  const reader=new FileReader();
  reader.onload=async(e)=>{
    const b64=e.target.result.split(',')[1];
    const mime=file.type;
    const isImage=mime.startsWith('image/');
    const isPdf=mime==='application/pdf';

    try{
      let content;
      if(isImage){
        content=[
          {type:'image',source:{type:'base64',media_type:mime,data:b64}},
          {type:'text',text:OCR_PROMPT}
        ];
      } else if(isPdf){
        content=[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
          {type:'text',text:OCR_PROMPT}
        ];
      } else {
        setStatus('⚠ Unsupported file type — use PDF, PNG or JPG','err');
        return;
      }

      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','x-api-key':_key,'anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content}]})
      });
      const resp=await r.json();
      if(resp.error)throw new Error(resp.error.message);
      const raw=resp.content[0].text.replace(/```json|```/g,'').trim();
      const data=JSON.parse(raw.slice(raw.indexOf('{'),raw.lastIndexOf('}')+1));
      fillFields(data);
      setStatus('✓ Fields auto-filled from invoice — review and generate','done');
    }catch(err){
      setStatus('❌ Error: '+err.message,'err');
      console.error(err);
    }
  };
  reader.readAsDataURL(file);
}

const OCR_PROMPT=`Extract all fields from this invoice/addendum document and return ONLY valid JSON:
{
  "contract": "contract reference number",
  "num": "addendum or invoice number",
  "date": "date in DD.MM.YYYY format",
  "seller": "seller/supplier company name",
  "buyer": "buyer company name",
  "product_en": "product name in English",
  "product_ru": "product name in Russian if visible",
  "origin_en": "country of origin in English",
  "origin_ru": "country of origin in Russian if visible",
  "lot": "lot number or batch reference",
  "qty": "quantity in tons",
  "bags": "number of bags or cartons with weight",
  "price": "price per ton (numbers only, no currency)",
  "currency": "EUR or USD or CHF",
  "total": "total value (numbers only, no currency)",
  "payment_en": "payment terms",
  "pack_en": "packaging description in English",
  "pack_ru": "packaging description in Russian if visible",
  "delivery_en": "delivery period",
  "incoterm": "incoterms and place",
  "notes": "any additional notes"
}
Leave fields empty string if not found. For currency use only EUR/USD/CHF.`;

function fillFields(data){
  const map={
    contract:'f-contract',num:'f-num',date:'f-date',
    seller:'f-seller',buyer:'f-buyer',
    product_en:'f-product-en',product_ru:'f-product-ru',
    origin_en:'f-origin-en',origin_ru:'f-origin-ru',
    lot:'f-lot',qty:'f-qty',bags:'f-bags',
    price:'f-price',total:'f-total',
    payment_en:'f-payment-en',
    pack_en:'f-pack-en',pack_ru:'f-pack-ru',
    delivery_en:'f-delivery-en',incoterm:'f-incoterm',
    notes:'f-notes'
  };
  Object.entries(map).forEach(([key,id])=>{
    if(data[key]){
      const el=document.getElementById(id);
      if(el)el.value=data[key];
    }
  });
  if(data.currency){
    const sel=document.getElementById('f-currency');
    if(sel)sel.value=data.currency;
  }
}

const now=new Date();
document.getElementById('f-date').value=String(now.getDate()).padStart(2,'0')+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+now.getFullYear();
</script>
